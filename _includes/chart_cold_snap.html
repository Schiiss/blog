<div id="cold-snap-chart" style="width:100%;"></div>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
(function() {
  // Data from energyiq.market_data.gold_ercot_spark_spread + silver_weather_hdd_cdd
  // HB_NORTH, Jan 20 – Feb 5 2026. Weekends excluded (no ERCOT settlement data).
  var dates = [
    '2026-01-20','2026-01-21','2026-01-22','2026-01-23',
    '2026-01-26','2026-01-27','2026-01-28','2026-01-29','2026-01-30',
    '2026-02-02','2026-02-03','2026-02-04','2026-02-05'
  ];

  var powerPrice  = [43.51, 22.44, 37.36, 25.41, 167.51, 115.73, 199.89, 26.62, 65.95, 16.49, 19.63, 22.42, 18.41];
  var sparkSpread = [16.16, -11.69, 2.04, -11.52, 119.91, 67.05, 147.67, -0.81, 35.47, -6.17, -3.55, -1.83, -6.15];
  var temperature = [42.0, 56.6, 48.3, 47.0, 21.4, 29.7, 34.0, 41.5, 37.0, 49.7, 58.7, 47.4, 49.9];

  var annotation = {
    x: '2026-01-26', y: 167.51,
    xref: 'x', yref: 'y',
    text: 'Cold front arrives<br>Avg 21°F in Dallas',
    showarrow: true,
    arrowhead: 2,
    arrowcolor: '#fc8181',
    font: { color: '#fc8181', size: 11 },
    ax: 70, ay: -40
  };

  var tracePower = {
    x: dates, y: powerPrice,
    name: 'Avg Power Price ($/MWh)',
    type: 'scatter', mode: 'lines+markers',
    line: { color: '#63b3ed', width: 2 }, marker: { size: 5 },
    hovertemplate: '%{x}<br>Power: $%{y}/MWh<extra></extra>'
  };

  var traceSpread = {
    x: dates, y: sparkSpread,
    name: 'CCGT Spark Spread ($/MWh)',
    type: 'scatter', mode: 'lines+markers',
    line: { color: '#f6ad55', width: 2 }, marker: { size: 5 },
    hovertemplate: '%{x}<br>Spread: $%{y}/MWh<extra></extra>'
  };

  var traceTemp = {
    x: dates, y: temperature,
    name: 'Dallas Avg Temp (°F)',
    type: 'scatter', mode: 'lines+markers',
    line: { color: '#fc8181', width: 2 }, marker: { size: 5 },
    xaxis: 'x2', yaxis: 'y2',
    hovertemplate: '%{x}<br>Temp: %{y}°F<extra></extra>'
  };

  function buildLayout(mobile) {
    var ann = mobile
      ? Object.assign({}, annotation, { ax: -60, ay: -30, font: { color: '#fc8181', size: 10 } })
      : annotation;
    return {
      grid: { rows: 2, columns: 1, pattern: 'independent', roworder: 'top to bottom' },
      paper_bgcolor: '#1a1a2e',
      plot_bgcolor: '#1a1a2e',
      font: { color: '#e2e8f0', family: 'monospace', size: mobile ? 11 : 12 },
      margin: mobile
        ? { t: 20, b: 80, l: 50, r: 10 }
        : { t: 50, b: 40, l: 60, r: 20 },
      height: mobile ? 420 : 500,
      showlegend: true,
      legend: mobile
        ? { orientation: 'h', x: 0, y: -0.18, font: { size: 10 } }
        : { orientation: 'h', x: 0, y: 1.08, font: { size: 12 } },
      xaxis:  { gridcolor: '#2d3748', linecolor: '#4a5568', tickformat: '%b %d' },
      yaxis:  { title: '$/MWh', gridcolor: '#2d3748', linecolor: '#4a5568', zeroline: true, zerolinecolor: '#718096' },
      xaxis2: { gridcolor: '#2d3748', linecolor: '#4a5568', tickformat: '%b %d' },
      yaxis2: { title: '°F', gridcolor: '#2d3748', linecolor: '#4a5568' },
      annotations: [ann]
    };
  }

  var config = { responsive: true, displayModeBar: false };
  var isMobile = window.innerWidth < 600;

  Plotly.newPlot('cold-snap-chart', [tracePower, traceSpread, traceTemp], buildLayout(isMobile), config);

  window.addEventListener('resize', function() {
    var mobile = window.innerWidth < 600;
    if (mobile !== isMobile) {
      isMobile = mobile;
      Plotly.relayout('cold-snap-chart', buildLayout(mobile));
    }
  });
})();
</script>
